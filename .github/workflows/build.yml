name: Build jQuery Docs

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: 'api.jquery.com tag (leave empty for latest)'
        required: false
        default: ''
  schedule:
    - cron: '37 6 * * *'
  push:
    branches: [main]
    paths:
      - 'src/translate/zh-translations.json'

permissions:
  contents: write
  models: read
  pull-requests: write
  pages: write
  id-token: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      upstream_tag: ${{ steps.tag.outputs.tag }}
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - name: Get latest upstream tag
        id: tag
        run: |
          TAG=$(git ls-remote --tags --refs --sort=-version:refname https://github.com/jquery/api.jquery.com.git \
            | grep -oP 'refs/tags/\Kv?[0-9].*' \
            | head -1)
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Upstream tag: $TAG"

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual trigger — always build"
            echo "should_build=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          TAG="${{ steps.tag.outputs.tag }}"
          if gh release view "$TAG" -R "${{ github.repository }}" &>/dev/null; then
            echo "Release $TAG already exists — skipping"
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "No release for $TAG — triggering build"
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

  translate:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      UPSTREAM_TAG: ${{ needs.check.outputs.upstream_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Clone upstream at tag
        run: |
          git clone --depth 1 --branch "$UPSTREAM_TAG" https://github.com/jquery/api.jquery.com.git upstream

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Parse + Generate
        run: node scripts/build.js --source="./upstream" --skip-chm

      - name: Validate translations
        id: validate
        run: |
          node scripts/validate-translate.js > validation-output.txt 2>&1
          GAPS=$(grep -oP 'Gaps:\s+\K\d+' validation-output.txt || echo "0")
          echo "gaps=$GAPS" >> $GITHUB_OUTPUT
          cat validation-output.txt

      - name: Export gaps for translation
        if: steps.validate.outputs.gaps != '0'
        run: |
          node scripts/export-gaps.js > gaps.json
          echo "Exported $(jq '. | length' gaps.json) entries to translate"

      - name: Translate gaps via GitHub Models (GPT-4o-mini)
        if: steps.validate.outputs.gaps != '0'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/llm-translate.js gaps.json translated.json

      - name: Import translations
        if: steps.validate.outputs.gaps != '0'
        run: |
          node scripts/import-longdesc.js translated.json
          node scripts/validate-translate.js > validation-after.txt 2>&1
          cat validation-after.txt

      - name: Create PR with translations
        if: steps.validate.outputs.gaps != '0'
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "fix: auto-translate gaps for ${{ env.UPSTREAM_TAG }}"
          title: "Translation auto-fill for ${{ env.UPSTREAM_TAG }}"
          body: |
            Auto-translated via GitHub Models (GPT-4o-mini).

            Upstream: [api.jquery.com ${{ env.UPSTREAM_TAG }}](https://github.com/jquery/api.jquery.com/releases/tag/${{ env.UPSTREAM_TAG }})

            This PR was automatically generated by the translation workflow.
          branch: auto-translate-${{ env.UPSTREAM_TAG }}
          delete-branch: true

      - name: Upload HTML as artifact
        uses: actions/upload-artifact@v7
        with:
          name: jquery-api-html
          path: dist/html/

  build-chm:
    needs: [check, translate]
    if: needs.check.outputs.should_build == 'true' && github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    timeout-minutes: 20
    env:
      UPSTREAM_TAG: ${{ needs.check.outputs.upstream_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Clone upstream at tag
        run: |
          git clone --depth 1 --branch "$env:UPSTREAM_TAG" https://github.com/jquery/api.jquery.com.git upstream

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install HTML Help Workshop
        run: choco install html-help-workshop -y --no-progress

      - name: Full Build + CHM
        run: node scripts/build.js --source="./upstream"

      - name: Upload CHM artifacts
        uses: actions/upload-artifact@v7
        with:
          name: jquery-api-chm
          path: dist/html/jquery-api-reference-*.chm

      - name: Create Release with CHM
        uses: softprops/action-gh-release@v3
        with:
          name: "jQuery API Reference — ${{ env.UPSTREAM_TAG }}"
          tag_name: "${{ env.UPSTREAM_TAG }}"
          files: dist/html/jquery-api-reference-*.chm
          body: |
            ## jQuery API Reference — ${{ env.UPSTREAM_TAG }}

            - **Online docs (EN)**: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/en/
            - **Online docs (ZH)**: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/zh/
            - **Upstream source**: [api.jquery.com ${{ env.UPSTREAM_TAG }}](https://github.com/jquery/api.jquery.com/releases/tag/${{ env.UPSTREAM_TAG }})

            ### Downloads
            - 📥 `jquery-api-reference-en.chm` — English CHM
            - 📥 `jquery-api-reference-zh.chm` — Chinese CHM
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-pages:
    needs: [check, translate]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      UPSTREAM_TAG: ${{ needs.check.outputs.upstream_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Clone upstream at tag
        run: |
          git clone --depth 1 --branch "$UPSTREAM_TAG" https://github.com/jquery/api.jquery.com.git upstream

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Parse + Generate
        run: node scripts/build.js --source="./upstream" --skip-chm

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist/html

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5
