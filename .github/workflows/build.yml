name: Build jQuery Docs

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: 'Git ref for api.jquery.com source (branch/tag)'
        required: false
        default: 'main'
  schedule:
    - cron: '37 6 * * *'  # Daily at 06:37 UTC

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout jquery-docs
        uses: actions/checkout@v7

      - name: Clone upstream api.jquery.com
        run: |
          git clone --depth 1 https://github.com/jquery/api.jquery.com.git upstream
        shell: bash

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (Parse + Generate)
        run: node scripts/build.js --source="./upstream" --skip-chm

      - name: Verify build output
        run: |
          echo "API pages: $(ls dist/html/api/*.html 2>/dev/null | wc -l)"
          echo "Index: $(test -f dist/html/index.html && echo 'yes' || echo 'MISSING')"
          echo "Cheatsheet: $(test -f dist/html/cheatsheet.html && echo 'yes' || echo 'MISSING')"
        shell: bash

      - name: Install HTML Help Workshop
        run: choco install html-help-workshop -y --no-progress
        shell: pwsh

      - name: Compile CHM
        run: node scripts/chm-compile.js

      - name: Upload CHM artifact
        uses: actions/upload-artifact@v7
        with:
          name: jquery-api-reference-chm
          path: dist/jquery-api-reference.chm

      - name: Upload HTML artifact
        uses: actions/upload-artifact@v7
        with:
          name: jquery-api-reference-html
          path: dist/html/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist/html
          full_commit_message: 'Deploy jQuery API docs [skip ci]'

      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v3
        with:
          name: 'jQuery API Reference — Build ${{ github.run_number }}'
          tag_name: 'release-${{ github.run_number }}'
          files: dist/jquery-api-reference.chm
          body: |
            ## jQuery API Reference CHM

            - **Build date**: ${{ github.event.repository.updated_at }}
            - **jQuery API source**: [api.jquery.com](https://github.com/jquery/api.jquery.com)
            - **Online version**: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/

            ### Download
            Download the CHM file below for offline use on Windows.

            ### Contents
            - API documentation for all jQuery methods, selectors, and properties
            - Searchable cheatsheet with version status indicators
            - Category-based Table of Contents
            - Keyword Index
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
