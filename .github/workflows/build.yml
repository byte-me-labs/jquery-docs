name: Build jQuery Docs

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: 'Git ref for api.jquery.com source (branch/tag)'
        required: false
        default: 'main'
      build_chm:
        description: 'Build CHM file (requires Windows)'
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '37 6 * * *'  # Daily at 06:37 UTC

permissions:
  contents: write

jobs:
  build-html:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone upstream api.jquery.com
        run: git clone --depth 1 https://github.com/jquery/api.jquery.com.git upstream

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (Parse + Generate)
        run: node scripts/build.js --source="./upstream" --skip-chm

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist/html
          full_commit_message: 'Deploy jQuery API docs [skip ci]'

  build-chm:
    if: github.event_name == 'workflow_dispatch' && inputs.build_chm
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone upstream api.jquery.com
        run: git clone --depth 1 https://github.com/jquery/api.jquery.com.git upstream
        shell: bash

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install HTML Help Workshop
        run: choco install html-help-workshop -y --no-progress
        shell: pwsh

      - name: Full Build + CHM
        run: node scripts/build.js --source="./upstream"
        shell: bash

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: 'jQuery API Reference — Build ${{ github.run_number }}'
          tag_name: 'release-${{ github.run_number }}'
          files: dist/jquery-api-reference.chm
          body: |
            ## jQuery API Reference CHM

            - **Online version**: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
            - **jQuery API source**: [api.jquery.com](https://github.com/jquery/api.jquery.com)

            Download the CHM file below for offline use on Windows.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
